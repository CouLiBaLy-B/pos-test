services:
  vllm:
    image: vllm/vllm-openai:v0.21.0
    container_name: vllm-server
    ports:
      - "${VLLM_PORT:-8000}:8000"
    shm_size: "16gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-Coder-30B-A3B-Instruct-AWQ}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-claude-sonnet-local}
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${VLLM_TOOL_CALL_PARSER:-qwen3_xml}
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-65536}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      - --dtype
      - ${VLLM_DTYPE:-float16}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  assistant-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: assistant-api
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "${ASSISTANT_API_PORT:-8080}:8080"
    environment:
      ASSISTANT_UPSTREAM_BASE_URL: http://vllm:8000
      ASSISTANT_AUTH_TOKEN: ${ASSISTANT_AUTH_TOKEN:-dummy}
      ASSISTANT_API_KEY: ${ASSISTANT_API_KEY:-dummy}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-claude-sonnet-local}
      ASSISTANT_DEFAULT_MAX_TOKENS: ${ASSISTANT_DEFAULT_MAX_TOKENS:-2048}
      ASSISTANT_REQUEST_TIMEOUT: ${ASSISTANT_REQUEST_TIMEOUT:-120}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-}
      ASSISTANT_ANTHROPIC_VERSION: ${ASSISTANT_ANTHROPIC_VERSION:-2023-06-01}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 15s


  assistant-sandbox:
    profiles: ["sandbox"]
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: assistant-sandbox
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://vllm:8000}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-dummy}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-sonnet-local}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-sonnet-local}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-sonnet-local}
    command: ["bash", "-lc", "sleep infinity"]
