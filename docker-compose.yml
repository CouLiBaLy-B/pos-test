services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    ports:
      - "${VLLM_PORT:-8000}:8000"
    shm_size: "16gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-Coder-30B-A3B-Instruct-AWQ}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen3-coder}
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${VLLM_TOOL_CALL_PARSER:-qwen3_xml}
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-65536}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      - --dtype
      - ${VLLM_DTYPE:-float16}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-admin-change-me}
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  assistant-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: assistant-api
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      - "${ASSISTANT_API_PORT:-8080}:8080"
    environment:
      ASSISTANT_UPSTREAM_BASE_URL: http://litellm:4000
      ASSISTANT_AUTH_TOKEN: ${ASSISTANT_AUTH_TOKEN:-sk-local-dummy}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-claude-3-5-sonnet-20241022}
      ASSISTANT_DEFAULT_MAX_TOKENS: ${ASSISTANT_DEFAULT_MAX_TOKENS:-2048}
      ASSISTANT_REQUEST_TIMEOUT: ${ASSISTANT_REQUEST_TIMEOUT:-120}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 15s
