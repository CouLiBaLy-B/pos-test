name: Bug report
description: Signaler un bug ou une régression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci de fournir assez de contexte pour reproduire le problème.
  - type: textarea
    id: summary
    attributes:
      label: Résumé du problème
      description: Que se passe-t-il exactement ?
      placeholder: Décrivez le bug observé.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      description: Liste claire et minimale des étapes
      placeholder: |
        1. Aller sur ...
        2. Lancer ...
        3. Observer ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
      placeholder: Décrivez le comportement attendu.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: GPU, OS, versions Docker, Claude Code, etc.
      placeholder: RTX 4090 / Ubuntu 24.04 / Docker 28.x / ...
